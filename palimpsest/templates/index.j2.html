<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palimpsest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=modules-1">
</head>
<body data-build="modules-1">
<script type="application/json" id="app-state">{{ state | tojson }}</script>
<template id="editor-workspace-template">
    <aside class="group-sidebar">
        <header class="pane-header">
            <div>
                <p class="eyebrow" data-browser-eyebrow></p>
                <h2 data-browser-title></h2>
            </div>
        </header>
        <div class="path-bar" data-path></div>
        <div class="file-list" data-file-list role="list"></div>
    </aside>

    <section class="editor-pane">
        <header class="pane-header">
            <div>
                <p class="eyebrow" data-editor-eyebrow></p>
                <h2 data-editor-title></h2>
            </div>
            <button class="text-button" data-save-button type="button">Save</button>
        </header>
        <p class="source-title" data-source-title></p>
        <div class="mode-toolbar" data-mode-toolbar hidden></div>
        <div class="code-editor">
            <pre class="highlight-surface" aria-hidden="true"><code data-highlight></code></pre>
            <textarea data-editor spellcheck="false"></textarea>
        </div>
        <p class="editor-status" data-status role="status"></p>
    </section>
</template>
<main class="app-shell" aria-label="Grammar and example editors">
    <aside class="config-pane" aria-labelledby="config-title">
        <header class="config-header">
            <div class="brand">
                <span class="brand-mark">P</span>
                <h1 id="config-title">{{ app_name }}</h1>
            </div>
        </header>
        <dl class="workspace-meta">
            <div>
                <dt>cwd</dt>
                <dd>{{ state.cwd }}</dd>
            </div>
            <div>
                <dt>config</dt>
                <dd>{{ state.config_path }}</dd>
            </div>
            <div>
                <dt>examples</dt>
                <dd>{{ state.examples_dir }}</dd>
            </div>
            <div>
                <dt>grammar files</dt>
                <dd>{{ state.grammar_files | join(", ") if state.grammar_files else "not configured" }}</dd>
            </div>
        </dl>
    </aside>

    <palimpsest-editor-workspace
        data-workspace="examples"
        data-browser-eyebrow="Examples"
        data-browser-title="Files"
        data-editor-eyebrow="Example"
        data-editor-title="Example Editor"
        data-empty-title="No example selected"
        data-editor-label="Example source"
        data-syntax-role="source"
        data-start-path="{{ state.examples_dir }}"
    ></palimpsest-editor-workspace>

    <palimpsest-editor-workspace
        data-workspace="grammar"
        data-browser-eyebrow="Grammars"
        data-browser-title="Files"
        data-editor-eyebrow="Grammar"
        data-editor-title="Grammar Editor"
        data-empty-title="No grammar selected"
        data-editor-label="Grammar source"
        data-syntax-role="grammar"
    ></palimpsest-editor-workspace>
</main>
<script type="module" src="{{ url_for('static', filename='js/app.mjs') }}?v=modules-1"></script>
</body>
</html>
