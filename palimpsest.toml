examples_dir = "./examples"

[capture_maps.clike]
keyword = "keyword"
type = "type"
function = "function"
variable = "variable"
number = "number"
string = "string"
comment = "comment"
operator = "operator"
punctuation = "punctuation"

[capture_maps.clike_lezer]
fn = "keyword"
let = "keyword"
return = "keyword"
if = "keyword"
else = "keyword"
while = "keyword"
Type = "type"
FunctionName = "function"
Callee = "function"
VariableName = "variable"
Identifier = "variable"
Number = "number"
String = "string"
LineComment = "comment"

[capture_maps.talkie]
class = "type"
selector = "function"
variable = "variable"
number = "number"
string = "string"
comment = "comment"
operator = "operator"
punctuation = "punctuation"

[[parsers.talkie_pest]]
adapter = "pest"
grammar_files = ["./examples/talkie-pest/src/talkie.pest"]
highlight_captures = "talkie"

[parsers.talkie_pest.build]
preset = "cargo-wasm-bindgen"
package = "talkie-pest"

[parsers.talkie_pest.runtime]
parse_export = "parse_to_json"

[[parsers.clike_nom]]
adapter = "nom"
grammar_files = ["./examples/clike-nom/src/lib.rs"]
highlight_captures = "clike"

[parsers.clike_nom.build]
preset = "cargo-wasm-bindgen"
package = "clike-nom"

[parsers.clike_nom.runtime]
parse_export = "parse_to_json"

[[parsers.clike_lezer]]
adapter = "lezer"
grammar_files = ["./examples/clike-lezer/src/clike.grammar"]
highlight_captures = "clike_lezer"

[parsers.clike_lezer.build]
preset = "lezer"

[parsers.clike_lezer.runtime]
parse_export = "parser"

[[filetypes.clike]]
extensions = ["*.clike"]
parser = "clike_nom"
highlight_captures = "clike"

[[filetypes.talkie]]
extensions = ["*.talkie"]
parser = "talkie_pest"
highlight_captures = "talkie"

[[filetypes.lclike]]
extensions = ["*.lclike"]
parser = "clike_lezer"
highlight_captures = "clike_lezer"
